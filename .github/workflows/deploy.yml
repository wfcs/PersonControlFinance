name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'sa-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/fincontrol-api:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/fincontrol-api:$IMAGE_TAG

      - name: Deploy to ECS
        run: |
          echo "Deploy to ${{ inputs.environment }} — update ECS service with new task definition"
          echo "Image: ${{ steps.login-ecr.outputs.registry }}/fincontrol-api:${{ github.sha }}"
          # aws ecs update-service --cluster fincontrol-${{ inputs.environment }} \
          #   --service api --force-new-deployment
